<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>AJAY UPI</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white">
    <div class="max-w-xl mx-auto p-5 mt-10">
        <h2 class="text-green-400 text-2xl mb-4 text-center">APPLY NOW</h2>
        <form id="cashbackForm">
            <input class="w-full p-3 mb-3 rounded bg-gray-800" name="name" placeholder="Full Name" required>
            <input class="w-full p-3 mb-3 rounded bg-gray-800" name="phone" placeholder="Mobile Number" required>
            <input class="w-full p-3 mb-3 rounded bg-gray-800" name="email" placeholder="Email" required>
            <button class="w-full bg-green-400 text-black p-3 rounded font-bold" type="submit">SUBMIT</button>
        </form>
    </div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyWE_GtRtaSRV52-_dnOgGutSb7T9CbGnoTYE-EyqTnYVXBe0hL_Xx9gNdRI6TXvp-oeQ/exec";

document.getElementById("cashbackForm").addEventListener("submit", async (e) => {
  e.preventDefault();
  const formData = {
    name: e.target.name.value,
    phone: e.target.phone.value,
    email: e.target.email.value
  };

  await fetch(API_URL, {
    method: "POST",
    mode: "no-cors",
    headers: { "Content-Type": "application/json" },
    body: JSON.stringify(formData)
  });

  alert("提交成功！");
  e.target.reset();
});
</script>
</body>
</html>
