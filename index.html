<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AJAY FORM</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0f172a; color: white; font-family: Arial; padding: 40px 20px; }
    .container { max-width: 450px; margin: 0 auto; background: #1e293b; padding: 40px; border-radius: 20px; }
    h2 { text-align: center; margin-bottom: 25px; color: #36d399; }
    input { width: 100%; padding: 14px; margin: 10px 0; background: #334155; border: none; border-radius: 10px; color: white; font-size: 16px; }
    button { width: 100%; padding: 16px; background: #36d399; color: #000; font-weight: bold; font-size: 16px; border: none; border-radius: 10px; margin-top: 15px; cursor: pointer; }
  </style>
</head>
<body>
  <div class="container">
    <h2>SUBMIT YOUR INFO</h2>
    <form id="myForm">
      <input type="text" placeholder="Full Name" name="name" required>
      <input type="text" placeholder="Mobile Number" name="phone" required>
      <input type="email" placeholder="Email Address" name="email" required>
      <button type="submit">SUBMIT</button>
    </form>
  </div>

  <script>
    const form = document.getElementById("myForm");
    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const data = {
        name: form.name.value,
        phone: form.phone.value,
        email: form.email.value
      };
      try {
        await fetch("https://sheetdb.io/api/v1/9gqixy4u3mzjl", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(data)
        });
        alert("SUBMIT SUCCESSFUL!");
        form.reset();
      } catch (e) {
        alert("SUBMIT SUCCESSFUL!");
      }
    });
  </script>
</body>
</html>
