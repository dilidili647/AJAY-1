<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body { background: #111827; color: white; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold text-[#36D399] mb-6">👑 Admin Panel | User Data</h1>

        <div class="bg-[#1F2937] rounded-xl p-6 shadow-lg mb-6 flex gap-3">
            <button onclick="refreshData()" class="bg-blue-500 px-5 py-2 rounded">🔄 Refresh Data</button>
            <button onclick="exportExcel()" class="bg-green-500 px-5 py-2 rounded">📊 Export Excel</button>
        </div>

        <div class="bg-[#1F2937] rounded-xl p-6 shadow-lg">
            <table class="w-full text-left">
                <thead>
                    <tr class="border-b border-gray-700">
                        <th class="py-3 text-[#36D399]">#</th>
                        <th class="py-3 text-[#36D399]">Name</th>
                        <th class="py-3 text-[#36D399]">Phone</th>
                        <th class="py-3 text-[#36D399]">Email</th>
                        <th class="py-3 text-[#36D399]">Time</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

<script>
let users = [];

// ✅ 【刷新按钮】核心功能
async function refreshData() {
    let res = await fetch("https://sheetdb.io/api/v1/59q8l2xj7w0a6");
    users = await res.json();
    render();
}

function render() {
    let html = "";
    users.forEach((u, i) => {
        html += `
        <tr class="border-b border-gray-800">
            <td class="py-3">${i+1}</td>
            <td class="py-3">${u.name}</td>
            <td class="py-3 font-bold text-[#36D399]">${u.phone}</td>
            <td class="py-3">${u.email}</td>
            <td class="py-3 text-gray-400 text-sm">${u.time}</td>
        </tr>`;
    });
    document.getElementById("tableBody").innerHTML = html;
}

// ✅ 导出 Excel
function exportExcel() {
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.json_to_sheet(users);
    XLSX.utils.book_append_sheet(wb, ws, "Users");
    XLSX.writeFile(wb, "UserList.xlsx");
}

refreshData();
</script>
</body>
</html>
