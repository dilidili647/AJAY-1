<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DATA VIEW</title>
  <style>
    body { background: #0f172a; color: white; padding: 30px; font-family: Arial; }
    .box { max-width: 600px; margin: 0 auto; background: #1e293b; padding: 30px; border-radius: 16px; }
    h2 { color: #36d399; text-align: center; margin-bottom: 20px; }
    .item { padding: 10px; border-bottom: 1px solid #334155; }
  </style>
</head>
<body>
  <div class="box">
    <h2>USER DATA</h2>
    <div id="result"></div>
  </div>

  <script>
    async function load() {
      const res = await fetch("https://api.jsonbin.io/v3/b/669a17c5e412453132fa1234/latest");
      const json = await res.json();
      const data = json.record.data;
      document.getElementById("result").innerHTML = `
        <div class="item">Name: ${data.name}</div>
        <div class="item">Phone: ${data.phone}</div>
        <div class="item">Email: ${data.email}</div>
      `;
    }
    load();
  </script>
</body>
