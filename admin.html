<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <style>
        body { background: #111827; color: white; }
    </style>
</head>
<body class="p-6">
    <div class="max-w-6xl mx-auto">
        <h1 class="text-3xl font-bold text-[#36D399] mb-6">👑 Admin Panel</h1>

        <div class="bg-[#1F2937] rounded-xl p-6 shadow-lg mb-6 flex gap-4">
            <button onclick="refreshData()" class="bg-blue-500 px-6 py-2 rounded">🔄 Refresh Data</button>
            <button onclick="exportExcel()" class="bg-green-500 px-6 py-2 rounded">📊 Export Excel</button>
        </div>

        <div class="bg-[#1F2937] rounded-xl p-6 shadow-lg">
            <table class="w-full text-left">
                <thead>
                    <tr class="border-b border-gray-700">
                        <th class="py-3 text-[#36D399]">#</th>
                        <th class="py-3 text-[#36D399]">Name</th>
                        <th class="py-3 text-[#36D399]">Phone</th>
                        <th class="py-3 text-[#36D399]">Email</th>
                        <th class="py-3 text-[#36D399]">Time</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>

<script>
let users = [];

async function refreshData() {
    try {
        let res = await fetch("https://script.googleusercontent.com/macros/echo?user_content_key=R0HYk1Ys7oS2H0N1H0N1H0N1H0N1H0N1H0N1H0N1H0N1H0N1&lib=MRpDQ0-864646464646464646");
        users = await res.json();
        renderTable();
    } catch (e) {
        alert("刷新失败");
    }
}

function renderTable() {
    let html = "";
    users.forEach((item, i) => {
        html += `
        <tr class="border-b border-gray-800">
            <td class="py-3">${i+1}</td>
            <td class="py-3">${item.name}</td>
            <td class="py-3 font-bold text-[#36D399]">${item.phone}</td>
            <td class="py-3">${item.email}</td>
            <td class="py-3 text-gray-400 text-sm">${item.time}</td>
        </tr>`;
    });
    document.getElementById("tableBody").innerHTML = html;
}

function exportExcel() {
    const wb = XLSX.utils.book_new();
    const ws = XLSX.utils.json_to_sheet(users);
    XLSX.utils.book_append_sheet(wb, ws, "Users");
    XLSX.writeFile(wb, "UserList.xlsx");
}

refreshData();
</script>
</body>
</html>
