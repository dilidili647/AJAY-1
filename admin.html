<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DATA PANEL</title>
  <style>
    body { background: #0f172a; color: white; padding: 30px; font-family: Arial; }
    .container { max-width: 900px; margin: 0 auto; }
    h2 { color: #36d399; text-align: center; margin-bottom: 30px; }
    .item { background: #1e293b; padding: 20px; margin: 10px 0; border-radius: 12px; }
    .item div { margin: 5px 0; }
    .item span { color: #94a3b8; }
  </style>
</head>
<body>
  <div class="container">
    <h2>USER SUBMITTED DATA</h2>
    <div id="list"></div>
  </div>

  <script>
    const list = document.getElementById("list");
    async function loadData() {
      const res = await fetch("https://sheetdb.io/api/v1/9gqixy4u3mzjl");
      const datas = await res.json();
      if (datas.length === 0) {
        list.innerHTML = "<div style='text-align:center'>No Data</div>";
        return;
      }
      datas.forEach((item, i) => {
        list.innerHTML += `
          <div class="item">
            <div>No: ${i+1}</div>
            <div>Name: ${item.name}</div>
            <div>Phone: ${item.phone}</div>
            <div>Email: ${item.email}</div>
          </div>
        `;
      });
    }
    loadData();
  </script>
</body>
</html>
